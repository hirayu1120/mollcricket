<body>

<header>
  <h1>ケラの生態まとめ</h1>
  <p>ケラの特徴・すみか・食べ物・行動をまとめるサイト</p>
</header>

<nav>

  <a href="#behavior">行動</a>
</nav>

<main>

  <section id="about">
    <h2>ケラとは</h2>
    <p>
      ケラはバッタ目ケラ科の昆虫で、前あしがモグラのように発達しており、
      土の中を掘って生活します。
    </p>
  </section>

  <section id="habitat">
    <h2>すみか</h2>
    <p>
      水田、湿った畑、河川敷、池の周辺など、やわらかく湿った土の中にすんでいます。
    </p>
  </section>

  <section id="food">
    <h2>食べ物</h2>
    <p>
      植物の根、小さな昆虫、有機物などを食べる雑食性です。
    </p>
  </section>

  <section id="behavior">
    <h2>行動</h2>
    <p>
      土を掘る、鳴く、泳ぐ、飛ぶなど、さまざまな行動をします。
      特にオスは繁殖期に地中から鳴いてメスを呼びます。
    </p>
  </section>

</main>
